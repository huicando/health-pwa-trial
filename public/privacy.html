    <title>健康随记隐私说明</title>
    <style>
      body { max-width: 720px; margin: 48px auto; padding: 0 24px; color: #20332c; font: 16px/1.7 system-ui, -apple-system, "Microsoft YaHei", sans-serif; }

  <body>
    <h1>健康随记隐私说明</h1>
    <p>健康随记用于记录个人体重、饮食、睡眠、运动与身体状态。数据仅写入使用者自行配置的 Supabase 项目。</p>
    <h2>数据使用</h2>
    <p>接入 AI 操作后，AI 仅在用户明确确认后写入单条健康记录，并可读取近期记录用于总结与建议。</p>
    <h2>数据控制</h2>
    <p>使用者可随时在自己的 Supabase 项目中查看、修改或删除记录及访问凭据。</p>
  </body>
</html>
